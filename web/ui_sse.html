<!DOCTYPE html><html lang=zh><head><meta charset=UTF-8><meta name=viewport content="width=device-width, initial-scale=1.0"><title>guyong-juhuo</title><style>*{box-sizing:border-box;margin:0;padding:0}body{font-family:-apple-system,"PingFang SC","Microsoft YaHei",sans-serif;background:#0d1117;color:#e6edf3;min-height:100vh;padding:2rem}.c{max-width:920px;margin:0 auto}.hh{display:flex;align-items:center;gap:1rem;margin-bottom:2rem;padding-bottom:1rem;border-bottom:1px solid #21262d}.hh h1{font-size:1.4rem;font-weight:600;color:#58a6ff}.hh .t{font-size:0.7rem;padding:0.15rem 0.5rem;background:#1f6feb22;color:#58a6ff;border-radius:999px;border:1px solid #1f6feb44}.hh .s{margin-left:auto;font-size:0.8rem;color:#8b949e;display:flex;gap:1.5rem}.hh .s span{color:#58a6ff;font-weight:600}.tabs{display:flex;gap:0.25rem;margin-bottom:1.5rem;border-bottom:1px solid #21262d;padding-bottom:0}.tab{padding:0.5rem 1rem;cursor:pointer;font-size:0.85rem;color:#8b949e;border-bottom:2px solid transparent;transition:all 0.15s;background:none;border:none;font-family:inherit}.tab:hover{color:#e6edf3}.tab.active{color:#58a6ff;border-bottom-color:#58a6ff}.card{background:#161b22;border:1px solid #21262d;border-radius:8px;padding:1.25rem;margin-bottom:1rem}.card-title{font-size:0.75rem;font-weight:600;color:#8b949e;text-transform:uppercase;letter-spacing:0.06em;margin-bottom:0.75rem}ta,in,sel{width:100%;background:#0d1117;border:1px solid #30363d;border-radius:6px;color:#e6edf3;font-size:0.95rem;padding:0.7rem;outline:none;transition:border-color 0.2s;font-family:inherit}ta:focus,in:focus,sel:focus{border-color:#58a6ff}ta{resize:vertical;min-height:80px}.br{display:flex;gap:0.5rem;margin-top:1rem}btn{padding:0.55rem 1.2rem;border-radius:6px;border:1px solid #30363d;background:#21262d;color:#e6edf3;font-size:0.85rem;cursor:pointer;transition:all 0.15s;font-family:inherit}btn:hover{background:#30363d}btn.primary{background:#1f6feb;border-color:#1f6feb;color:#fff}btn.primary:hover{background:#388bfd}btn:disabled{opacity:0.5;cursor:not-allowed}.cplx{display:inline-block;padding:0.2rem 0.7rem;border-radius:4px;font-size:0.78rem;font-weight:600;margin-bottom:1rem}.cplx.s{background:#3fb95022;color:#3fb950;border:1px solid #3fb95044}.cplx.c{background:#d2992222;color:#d29922;border:1px solid #d2992244}.cplx.x{background:#f8514922;color:#f85149;border:1px solid #f8514944}.dims{display:flex;flex-wrap:wrap;gap:0.4rem;margin-bottom:0.5rem}.dt{display:flex;align-items:center;gap:0.4rem;padding:0.35rem 0.65rem;background:#0d1117;border-radius:4px;font-size:0.8rem;border:1px solid #21262d}.b{font-size:0.62rem;padding:0.06rem 0.3rem;border-radius:3px;font-weight:700;text-transform:uppercase}.b.m{background:#f8514922;color:#f85149}.b.i{background:#d2992222;color:#d29922}.b.k{background:#3fb95022;color:#3fb950}.dbk{background:#0d1117;border:1px solid #21262d;border-radius:6px;padding:0.85rem;margin-bottom:0.6rem}.dbk .dn{font-size:0.72rem;color:#58a6ff;font-weight:600;margin-bottom:0.5rem}.dbk .q{font-size:0.82rem;color:#8b949e;margin-bottom:0.35rem;padding-left:0.5rem;border-left:2px solid #30363d}.dbk ta{min-height:44px;font-size:0.85rem;margin-top:0.35rem;resize:none}.db{background:#0d1117;border:1px solid #30363d;border-radius:6px;padding:1rem;margin-top:1rem}.db label{display:block;font-size:0.8rem;color:#8b949e;margin-bottom:0.5rem;font-weight:600}.fbrow{display:flex;gap:0.5rem;margin-top:0.75rem;align-items:center;flex-wrap:wrap}.fbrow label{color:#8b949e;font-size:0.82rem}.fb{padding:0.28rem 0.65rem;font-size:0.78rem;border-radius:4px;cursor:pointer;border:1px solid #30363d;background:#21262d;color:#8b949e;transition:all 0.15s;font-family:inherit}.fb:hover{color:#e6edf3}.fb.g{border-color:#3fb95044;color:#3fb950}.fb.bd{border-color:#f8514944;color:#f85149}.fb.ag{background:#3fb95022;border-color:#3fb950}.fb.ab{background:#f8514922;border-color:#f85149}.hi{display:flex;gap:0.75rem;padding:0.6rem 0;border-bottom:1px solid #21262d;font-size:0.83rem;align-items:center}.hi:last-child{border-bottom:none}.hi .ts{color:#8b949e;min-width:72px;flex-shrink:0}.hi .task{flex:1;color:#e6edf3;word-break:break-all}.hi .decision{min-width:90px;color:#58a6ff;flex-shrink:0}.hi .fb{min-width:36px;text-align:center;flex-shrink:0}.hi .fb.g{color:#3fb950}.hi .fb.bd{color:#f85149}.hi .fb.n{color:#484f58}.sg{grid-template-columns:repeat(3,1fr);gap:1rem;margin-bottom:1rem;display:grid}.sbox{background:#0d1117;border:1px solid #21262d;border-radius:6px;padding:1rem;text-align:center}.sbox .num{font-size:2rem;font-weight:700;color:#58a6ff}.sbox .lbl{font-size:0.72rem;color:#8b949e;margin-top:0.25rem}.li{background:#0d1117;border:1px solid #21262d;border-radius:4px;padding:0.6rem 0.8rem;margin-bottom:0.4rem;font-size:0.82rem;display:flex;gap:0.75rem;align-items:center}.li .dim{color:#58a6ff;font-weight:600;min-width:80px}.li .pattern{flex:1;color:#8b949e}.li .cnt{margin-left:auto;color:#d29922;font-weight:600;min-width:50px;text-align:right}.hidden{display:none}.result-header{display:flex;gap:1.5rem;align-items:flex-start;margin-bottom:1rem}.result-left{flex:1;min-width:0}.result-right{width:300px;flex-shrink:0;display:flex;flex-direction:column;align-items:center;justify-content:center}#radar-wrap{width:260px;height:260px}.legend{display:flex;flex-wrap:wrap;gap:0.5rem;margin-top:0.5rem;justify-content:center}.legend-item{display:flex;align-items:center;gap:0.3rem;font-size:0.7rem;color:#8b949e}</style></head><body><div class=c><div class=hh><h1>guyong-juhuo</h1><span class=t>十维判断框架</span><div class=s><span id=stat-total>0</span>判断 &nbsp;<span id=stat-acc>0</span>%</div></div><div class=tabs><button class="tab active" id=tab-analyze onclick=switchTab("analyze")>分析</button><button class=tab id=tab-history onclick=switchTab("history")>历史</button><button class=tab id=tab-stats onclick=switchTab("stats")>统计</button></div><div id=tab-content-analyze><div class=card><div class=card-title>输入任务</div><textarea id=task placeholder="描述你的判断情境，比如：工作很矛盾不知道选哪个、要不要辞职、和朋友合作做什么生意..."></textarea><div class=br><select id=profile><option value="">无profile（超越模式）</option></select><button class=primary id=btn-analyze onclick=analyze()>十维分析</button><button class=primary id=btn-stream onclick=streamAnalyze()>流式分析</button></div></div><div id=stream-log style="display:none;margin-top:1rem;padding:0.8rem;background:#161b22;border:1px solid #21262d;border-radius:8px;font-size:0.8rem;color:#8b949e;max-height:200px;overflow-y:auto"></div><div id=result-area class=hidden></div></div><div id=tab-content-history class=hidden><div class=card><div class=card-title>最近判断</div><div id=history-list></div></div></div><div id=tab-content-stats class=hidden><div class=card><div class=card-title>统计</div><div class=sg><div class=sbox><div class=num id=s-total>0</div><div class=lbl>总判断</div></div><div class=sbox><div class=num id=s-good>0</div><div class=lbl>正确</div></div><div class=sbox><div class=num id=s-acc>0%</div><div class=lbl>准确率</div></div></div></div><div class=card><div class=card-title>教训</div><div id=lessons-list></div></div></div></div></div><script>var currentResult=null;var selectedFeedback=null;function switchTab(name){document.querySelectorAll('.tab').forEach(function(t){t.classList.remove('active')});document.getElementById('tab-'+name).classList.add('active');document.querySelectorAll('[id^=tab-content]').forEach(function(c){c.classList.add('hidden')});document.getElementById('tab-content-'+name).classList.remove('hidden');if(name==='history'){loadHistory()}if(name==='stats'){loadStats()}}var H='hello';var X='hai';async function analyze(){var task=document.getElementById('task').value.trim();if(!task){alert('请输入任务');return}var profile=document.getElementById('profile').value;document.getElementById('btn-analyze').disabled=true;document.getElementById('btn-analyze').textContent='分析中...';try{var resp=await fetch('/analyze',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({task:task,profile:profile||null})});var result=await resp.json();if(result.error){alert(result.error);return}currentResult=result;renderResult(result);refreshStats()}catch(e){alert('Error: '+e)}finally{document.getElementById('btn-analyze').disabled=false;document.getElementById('btn-analyze').textContent='十维分析'}}function renderResult(r){var el=document.getElementById('result-area');el.classList.remove('hidden');var cplxClass=r.complexity==='simple'?'s':r.complexity==='critical'?'x':'c';var must=r.must_check||[];var imp=r.important||[];var skip=r.skipped||[];var allDims=['cognitive','game_theory','economic','dialectical','emotional','intuitive','moral','social','temporal','metacognitive'];var dimZh={cognitive:'认知',game_theory:'博弈',economic:'经济',dialectical:'辩证',emotional:'情绪',intuitive:'直觉',moral:'道德',social:'社会',temporal:'时间',metacognitive:'元认知'};var dimColor={};must.forEach(function(d){dimColor[d]='#f85149'});imp.forEach(function(d){dimColor[d]='#d29922'});skip.forEach(function(d){dimColor[d]='#484f58'});allDims.forEach(function(d){if(!dimColor[d])dimColor[d]='#3fb950'});var n=10,cx=130,cy=130,r2=100;var svg='<svg viewBox="0 0 260 260" width="260" height="260" style="overflow:visible">';svg+='<text x="130" y="14" text-anchor="middle" fill="#e6edf3" font-size="10" font-weight="600" font-family="sans-serif">十维检视图</text>';for(var l=1;l<=3;l++){svg+='<circle cx="'+cx+'" cy="'+cy+'" r="'+(r2*l/3)+'" fill="none" stroke="#30363d" stroke-width="0.5"/>'}var pts=[];for(var i=0;i<n;i++){var angle=(i*2*Math.PI/n)-Math.PI/2;var x=cx+r2*Math.cos(angle);var y=cy+r2*Math.sin(angle);pts.push([x,y]);svg+='<line x1="'+cx.toFixed(1)+'" y1="'+cy.toFixed(1)+'" x2="'+x.toFixed(1)+'" y2="'+y.toFixed(1)+'" stroke="#30363d" stroke-width="0.5"/>';var lr=r2+14;var lx=cx+lr*Math.cos(angle);var ly=cy+lr*Math.sin(angle);svg+='<text x="'+lx.toFixed(1)+'" y="'+ly.toFixed(1)+'" text-anchor="middle" dominant-baseline="middle" fill="#8b949e" font-size="9" font-family="sans-serif">'+dimZh[allDims[i]]+'</text>';var fill=dimColor[allDims[i]];svg+='<circle cx="'+x.toFixed(1)+'" cy="'+y.toFixed(1)+'" r="4" fill="'+fill+'" opacity="0.85"/>';var poly_pts=must.concat(imp).concat(skip).filter(function(id){return must.indexOf(id)<0&&imp.indexOf(id)<0}).map(function(id){var idx=allDims.indexOf(id);return pts[idx][0].toFixed(1)+','+pts[idx][1].toFixed(1)});if(poly_pts.length>0){svg+='<polygon points="'+poly_pts.join(' ')+'" fill="rgba(63,185,80,0.15)" stroke="#3fb950" stroke-width="1.5" stroke-opacity="0.6"/>'}var must_pts=must.map(function(id){var idx=allDims.indexOf(id);return pts[idx][0].toFixed(1)+','+pts[idx][1].toFixed(1)});if(must_pts.length>0)svg+='<polygon points="'+must_pts.join(' ')+'" fill="rgba(248,81,73,0.2)" stroke="#f85149" stroke-width="1.5" stroke-opacity="0.7"/>';var imp_pts=imp.map(function(id){var idx=allDims.indexOf(id);return pts[idx][0].toFixed(1)+','+pts[idx][1].toFixed(1)});if(imp_pts.length>0)svg+='<polygon points="'+imp_pts.join(' ')+'" fill="rgba(210,153,34,0.2)" stroke="#d29922" stroke-width="1.5" stroke-opacity="0.7"/>';var skip_pts=skip.map(function(id){var idx=allDims.indexOf(id);return pts[idx][0].toFixed(1)+','+pts[idx][1].toFixed(1)});if(skip_pts.length>0)svg+='<polygon points="'+skip_pts.join(' ')+'" fill="rgba(72,79,88,0.15)" stroke="#484f58" stroke-width="1" stroke-opacity="0.5"/>'}svg+='</svg>';var html='<div class=card><div class=result-header><div class=result-left><div class=card-title>复杂度</div><span class="cplx '+cplxClass+'">'+r.complexity+'</span>';html+='<div class=dims>';must.forEach(function(d){html+='<div class=dt><span class="b m">!</span><span>'+d+'</span></div>'});imp.forfunction setFeedback(v){selectedFeedback=v;document.getElementById('fb-good').className='fb'+(v===H?' g ag':' g');document.getElementById('fb-bad').className='fb'+(v===X?' bd ab':' bd')}async function submitDecision(){var decision=document.getElementById('decision').value.trim();if(!decision){alert('请填写决策');return}if(!currentResult){alert('请先分析');return}try{await fetch('/log',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({task:document.getElementById('task').value.trim(),result:currentResult,decision:decision,feedback:selectedFeedback})});alert('已记录');currentResult=null;selectedFeedback=null;document.getElementById('result-area').classList.add('hidden')}catch(e){alert('Error: '+e)}}async function loadHistory(){try{var resp=await fetch('/history');var list=await resp.json();var el=document.getElementById('history-list');if(list.length===0){el.innerHTML='<div style=color:#8b949e;text-align:center;padding:1rem>暂无历史</div>';return}var html='';for(var i=0;i<list.length;i++){var d=list[i];var fb=d.feedback||'';var fbClass=fb===H?'g':fb===X?'bd':'n';html+='<div class=hi><span class=ts>'+d.timestamp.slice(0,10)+'</span><span class=task>'+d.task+'</span><span class=decision>'+d.decision+'</span><span class="fb '+fbClass+'">'+(fb||'-')+'</span></div>'}el.innerHTML=html}catch(e){console.log(e)}}async function loadStats(){try{var resp=await fetch('/stats');var s=await resp.json();document.getElementById('s-total').textContent=s.total_decisions||0;document.getElementById('s-good').textContent=s.stats?s.stats.good:0;document.getElementById('s-acc').textContent=(s.stats?s.stats.accuracy:0)+'%';document.getElementById('stat-total').textContent=s.total_decisions||0;document.getElementById('stat-acc').textContent=(s.stats?s.stats.accuracy:0)+'%';var resp2=await fetch('/lessons');var lessons=await resp2.json();var el=document.getElementById('lessons-list');if(lessons.length===0){el.innerHTML='<div style=color:#8b949e;text-align:center;padding:1rem>暂无教训</div>';return}var html='';for(var i=0;i<lessons.length;i++){var l=lessons[i];html+='<div class=li><span class=dim>'+l.dimension+'</span><span class=pattern>'+l.pattern+'</span><span class=cnt>x'+l.count+'</span></div>'}el.innerHTML=html}catch(e){console.log(e)}};async function refreshStats(){try{var resp=await fetch('/stats');var s=await resp.json();document.getElementById('stat-total').textContent=s.total_decisions||0;document.getElementById('stat-acc').textContent=(s.stats?s.stats.accuracy:0)+'%'}catch(e){}};async function loadProfiles(){try{var resp=await fetch('/profiles');var profiles=await resp.json();var sel=document.getElementById('profile');profiles.forEach(function(p){var opt=document.createElement('option');opt.value=p;opt.textContent=p;sel.appendChild(opt)})}catch(e){}};window.onload=function(){loadProfiles();refreshStats()};;var _sseState={dims:{},weights:{}};function _sseLog(m){var el=document.getElementById("stream-log");if(el){el.style.display="block";el.innerHTML+='<div style="margin-bottom:0.3rem"><span style="color:#58a6ff">></span> '+m+'</div>';el.scrollTop=el.scrollHeight;}}function streamAnalyze(){var t=document.getElementById("task-input")?document.getElementById("task-input").value:document.getElementById("task").value;t=t.trim();if(!t){alert("Please enter a task");return;}document.getElementById("result-area").classList.remove("hidden");document.getElementById("btn-stream").disabled=true;document.getElementById("btn-stream").textContent="流式中...";_sseState={dims:{},weights:{}};var url="/analyze/stream?task="+encodeURIComponent(t);var es=new EventSource(url);_sseLog("Connecting to SSE...");es.addEventListener("init",function(e){var d=JSON.parse(e.data);_sseState.weights=d.weights||{};_sseLog("Weights loaded: "+Object.keys(_sseState.weights).length+" dimensions");});es.addEventListener("dimension",function(e){var d=JSON.parse(e.data);_sseState.dims[d.dimension_id]={score:d.score,reasoning:d.reasoning,priority:d.priority};_sseLog("<b style='color:#58a6ff'>"+d.dimension_name+"</b> score="+Math.round((d.score||0)*100)+"% priority="+d.priority);});es.addEventListener("confidence",function(e){var d=JSON.parse(e.data);_sseLog("<b style='color:#3fb950'>Confidence:</b> "+d.layered_verdict+" ("+(d.core_judgments||[]).length+" core)");});es.addEventListener("causal",function(e){var d=JSON.parse(e.data);_sseLog("<b style='color:#d29922'>Causal:</b> "+(d.root_causes||[]).slice(0,3).join(", "));});es.addEventListener("recursive",function(e){var d=JSON.parse(e.data);_sseLog("<b style='color:#a371f7'>Recursive:</b> "+(d.probes||[]).length+" probes at depth "+d.depth_reached);});es.addEventListener("meta",function(e){var d=JSON.parse(e.data);_sseLog("<b style='color:#58a6ff'>Meta:</b> "+d.meta_verdict+" adjustment="+d.adjustment);});es.addEventListener("debate",function(e){var d=JSON.parse(e.data);_sseLog("<b style='color:#3fb950'>Debate:</b> "+d.strong_count+" strong arguments, verdict="+d.verdict);});es.addEventListener("final",function(e){var d=JSON.parse(e.data);_sseLog("<b style='color:#3fb950'>FINAL:</b> Analysis complete! "+(Object.keys(d.scores||{}).length)+" dimensions scored");_sseState.dims=d.scores||{};_sseState.weights=d.weights||{};if(typeof renderResult==="function"&&Object.keys(_sseState.dims).length>0){try{var fakeResult={dimensions:Object.keys(_sseState.dims).map(function(k){var s=_sseState.dims[k];return{id:k,name:k,score:typeof s==="object"?s.score:s,reasoning:typeof s==="object"?s.reasoning:""};}),weights:_sseState.weights};renderResult(fakeResult);refreshStats&&refreshStats();}catch(err){_sseLog("Render error: "+err);}}es.close();document.getElementById("btn-stream").disabled=false;document.getElementById("btn-stream").textContent="流式分析";});es.addEventListener("error",function(e){_sseLog("<b style='color:#f85149'>Error:</b> SSE connection error");es.close();document.getElementById("btn-stream").disabled=false;document.getElementById("btn-stream").textContent="流式分析";});}
</script></body></html>
